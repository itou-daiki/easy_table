<!DOCTYPE html>
<html lang="ja" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時間割作成システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eaf4ff', 100: '#d0e7ff', 200: '#a8d3ff',
              300: '#7cbdff', 400: '#4da8ff', 500: '#1e90ff',
              600: '#1a7ee0', 700: '#1568bf', 800: '#10529f', 900: '#0a3d7f',
            }
          },
          fontFamily: {
            sans: ['"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', '"Noto Sans JP"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/print.css" media="print">
</head>
<body class="h-full bg-gray-50 text-gray-800 antialiased">
  <div id="app" class="flex h-full">

    <!-- サイドバー -->
    <aside id="sidebar" class="no-print w-56 bg-white border-r border-gray-200 flex flex-col shrink-0 transition-transform duration-200 lg:translate-x-0 fixed lg:static inset-y-0 left-0 z-40 -translate-x-full">
      <div class="px-5 py-4 border-b border-gray-100">
        <div class="text-base font-bold text-primary-600 tracking-tight">時間割作成</div>
        <div class="text-[10px] text-gray-400 mt-0.5">Timetable System v1.0</div>
      </div>
      <nav id="sidebar-nav" class="flex-1 py-2 px-2 space-y-0.5 overflow-y-auto">
        <button data-page="dashboard" class="nav-item active">
          <span class="nav-icon">■</span>ダッシュボード
        </button>
        <button data-page="timetable" class="nav-item">
          <span class="nav-icon">▦</span>時間割
        </button>
        <div class="pt-3 pb-1 px-3 text-[10px] font-semibold text-gray-400 uppercase tracking-wider">マスタ管理</div>
        <button data-page="teachers" class="nav-item">
          <span class="nav-icon">◉</span>教員
        </button>
        <button data-page="classes" class="nav-item">
          <span class="nav-icon">◎</span>クラス
        </button>
        <button data-page="rooms" class="nav-item">
          <span class="nav-icon">□</span>教室
        </button>
        <button data-page="subjects" class="nav-item">
          <span class="nav-icon">▤</span>科目
        </button>
      </nav>
      <div class="px-4 py-3 border-t border-gray-100 space-y-0.5">
        <div class="text-[9px] text-gray-400 font-semibold mb-1">ショートカット</div>
        <div class="text-[9px] text-gray-400"><kbd class="px-1 py-0.5 bg-gray-100 rounded text-[8px]">1</kbd>-<kbd class="px-1 py-0.5 bg-gray-100 rounded text-[8px]">6</kbd> ページ切替</div>
        <div class="text-[9px] text-gray-400"><kbd class="px-1 py-0.5 bg-gray-100 rounded text-[8px]">Ctrl+S</kbd> 保存</div>
        <div class="text-[9px] text-gray-400"><kbd class="px-1 py-0.5 bg-gray-100 rounded text-[8px]">Ctrl+Z</kbd> 元に戻す</div>
        <div class="text-[9px] text-gray-400"><kbd class="px-1 py-0.5 bg-gray-100 rounded text-[8px]">Ctrl+Y</kbd> やり直し</div>
      </div>
    </aside>

    <!-- サイドバーオーバーレイ（モバイル） -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/30 z-30 hidden lg:hidden"></div>

    <!-- メインエリア -->
    <div class="flex-1 flex flex-col min-w-0">

      <!-- ヘッダー -->
      <header class="no-print h-13 bg-white border-b border-gray-200 flex items-center px-4 lg:px-6 shrink-0">
        <button id="sidebar-toggle" class="lg:hidden mr-3 p-1.5 rounded hover:bg-gray-100 text-gray-500">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h2 id="page-title" class="text-base font-semibold text-gray-800 truncate">ダッシュボード</h2>
        <div class="flex-1"></div>
        <div class="flex items-center gap-2">
          <button id="btn-csv-import" class="text-xs px-3 py-1.5 rounded border border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors">インポート</button>
          <button id="btn-csv-export" class="text-xs px-3 py-1.5 rounded border border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors">エクスポート</button>
          <button id="btn-save" class="text-xs px-3 py-1.5 rounded bg-primary-500 text-white hover:bg-primary-600 transition-colors font-medium">保存</button>
        </div>
      </header>

      <!-- コンテンツ -->
      <main class="flex-1 overflow-auto p-4 lg:p-6">

        <!-- ダッシュボード -->
        <div id="page-dashboard">
          <div id="dashboard-stats" class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6"></div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div id="dashboard-violations" class="bg-white rounded-lg border border-gray-200 p-4">
              <h3 class="text-sm font-semibold text-gray-700 mb-3">制約チェック</h3>
              <div id="violations-content" class="text-sm text-gray-500">データをインポートしてください</div>
            </div>
            <div class="bg-white rounded-lg border border-gray-200 p-4">
              <h3 class="text-sm font-semibold text-gray-700 mb-3">クイックアクション</h3>
              <div class="space-y-2">
                <button id="btn-load-sample" class="w-full text-left text-sm px-3 py-2 rounded border border-gray-200 hover:bg-primary-50 hover:border-primary-300 transition-colors">サンプルデータを読み込む</button>
                <button id="btn-go-timetable" class="w-full text-left text-sm px-3 py-2 rounded border border-gray-200 hover:bg-primary-50 hover:border-primary-300 transition-colors">時間割を開く</button>
                <button id="btn-reset-data" class="w-full text-left text-sm px-3 py-2 rounded border border-red-100 text-red-600 hover:bg-red-50 transition-colors">データをリセット</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 時間割 -->
        <div id="page-timetable" class="hidden">
          <div class="flex flex-wrap items-center gap-3 mb-4">
            <div class="flex bg-white border border-gray-200 rounded-lg overflow-hidden">
              <button data-view="class" class="view-tab active">クラス別</button>
              <button data-view="teacher" class="view-tab">教員別</button>
              <button data-view="room" class="view-tab">教室別</button>
            </div>
            <select id="entity-picker" class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 bg-white focus:ring-2 focus:ring-primary-200 focus:border-primary-400 outline-none min-w-[160px]"></select>
            <div class="flex-1"></div>
            <div class="flex gap-2">
              <button id="btn-auto-place" class="text-xs px-3 py-1.5 rounded bg-primary-500 text-white hover:bg-primary-600 transition-colors font-medium">自動配置</button>
              <button id="btn-optimize" class="text-xs px-3 py-1.5 rounded bg-primary-500 text-white hover:bg-primary-600 transition-colors font-medium">最適化</button>
              <button id="btn-validate" class="text-xs px-3 py-1.5 rounded border border-amber-300 text-amber-700 hover:bg-amber-50 transition-colors font-medium">制約チェック</button>
            </div>
          </div>
          <div id="timetable-grid" class="overflow-x-auto"></div>
          <div id="validation-results" class="mt-4"></div>
        </div>

        <!-- 教員管理 -->
        <div id="page-teachers" class="hidden">
          <div class="flex items-center justify-between mb-4">
            <input id="search-teachers" type="text" placeholder="教員を検索..." class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 w-64 focus:ring-2 focus:ring-primary-200 focus:border-primary-400 outline-none">
            <button id="btn-add-teacher" class="text-xs px-3 py-1.5 rounded bg-primary-500 text-white hover:bg-primary-600 transition-colors font-medium">教員を追加</button>
          </div>
          <div id="teachers-table-container" class="bg-white rounded-lg border border-gray-200 overflow-hidden"></div>
        </div>

        <!-- クラス管理 -->
        <div id="page-classes" class="hidden">
          <div class="flex items-center justify-between mb-4">
            <input id="search-classes" type="text" placeholder="クラスを検索..." class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 w-64 focus:ring-2 focus:ring-primary-200 focus:border-primary-400 outline-none">
            <button id="btn-add-class" class="text-xs px-3 py-1.5 rounded bg-primary-500 text-white hover:bg-primary-600 transition-colors font-medium">クラスを追加</button>
          </div>
          <div id="classes-table-container" class="bg-white rounded-lg border border-gray-200 overflow-hidden"></div>
        </div>

        <!-- 教室管理 -->
        <div id="page-rooms" class="hidden">
          <div class="flex items-center justify-between mb-4">
            <input id="search-rooms" type="text" placeholder="教室を検索..." class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 w-64 focus:ring-2 focus:ring-primary-200 focus:border-primary-400 outline-none">
            <button id="btn-add-room" class="text-xs px-3 py-1.5 rounded bg-primary-500 text-white hover:bg-primary-600 transition-colors font-medium">教室を追加</button>
          </div>
          <div id="rooms-table-container" class="bg-white rounded-lg border border-gray-200 overflow-hidden"></div>
        </div>

        <!-- 科目管理 -->
        <div id="page-subjects" class="hidden">
          <div class="flex items-center justify-between mb-4">
            <input id="search-subjects" type="text" placeholder="科目を検索..." class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 w-64 focus:ring-2 focus:ring-primary-200 focus:border-primary-400 outline-none">
            <button id="btn-add-subject" class="text-xs px-3 py-1.5 rounded bg-primary-500 text-white hover:bg-primary-600 transition-colors font-medium">科目を追加</button>
          </div>
          <div id="subjects-table-container" class="bg-white rounded-lg border border-gray-200 overflow-hidden"></div>
        </div>

      </main>
    </div>
  </div>

  <!-- モーダル -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div id="modal-content" class="bg-white rounded-xl shadow-xl w-full max-w-lg max-h-[85vh] overflow-y-auto animate-modal-in">
      <div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-100">
        <h3 id="modal-title" class="text-sm font-bold text-gray-800"></h3>
        <button id="btn-modal-close" class="text-gray-400 hover:text-gray-600 text-lg leading-none">&times;</button>
      </div>
      <div id="modal-body" class="px-5 py-4"></div>
      <div class="flex justify-end gap-2 px-5 py-3 border-t border-gray-100">
        <button id="btn-modal-cancel" class="text-xs px-4 py-1.5 rounded border border-gray-300 text-gray-600 hover:bg-gray-50">キャンセル</button>
        <button id="btn-modal-save" class="text-xs px-4 py-1.5 rounded bg-primary-500 text-white hover:bg-primary-600 font-medium">保存</button>
      </div>
    </div>
  </div>

  <!-- プログレスバー -->
  <div id="progress-bar" class="hidden fixed bottom-0 inset-x-0 h-8 bg-white border-t border-gray-200 flex items-center z-50">
    <div id="progress-fill" class="absolute inset-y-0 left-0 bg-primary-100 transition-all duration-300" style="width:0%"></div>
    <span id="progress-text" class="relative z-10 text-xs font-medium text-primary-700 pl-4">処理中...</span>
  </div>

  <!-- トースト通知 -->
  <div id="notification-area" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

  <!-- CSV入力 -->
  <input type="file" id="csv-file-input" accept=".csv" class="hidden">

  <script type="module" src="js/main.js"></script>
</body>
</html>
